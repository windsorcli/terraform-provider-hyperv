# Tag-triggered release workflow. Cuts a GitHub Release with cross-
# compiled provider binaries, GPG-signed checksums, and the registry
# manifest. The Terraform Registry picks up the resulting release via
# the windsorcli/hyperv webhook configured at registry publication
# time.
#
# Layout matches PLAN.md S16.3. One secret the maintainer must set
# before tagging:
#
#   GPG_PRIVATE_KEY  -- ASCII-armored release-signing private key.
#
# Fingerprint is emitted as the `fingerprint` output of the import-gpg
# step and passed through to GoReleaser as GPG_FINGERPRINT env -- not
# a secret, derived at runtime.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Required to create the GitHub Release.

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # GoReleaser needs full history to compute changelog deltas
          # and detect the prior tag.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Import GPG release-signing key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      # release-drafter maintains a tagless draft release with curated
      # notes auto-curated from merged PR titles -- the draft's tag_name
      # field is set to the resolved next version (e.g. "v0.1.4") even
      # though no git tag exists yet. Capture that body to a file BEFORE
      # GoReleaser runs: GoReleaser's `replace_existing_draft: true` will
      # delete release-drafter's draft and create a fresh empty one in
      # its place. Without this capture, the curated notes would be
      # orphaned and the published release body would be empty.
      #
      # If no matching draft exists (e.g. user pushed a tag that doesn't
      # match release-drafter's resolved version, or release-drafter
      # hasn't run yet), the file ends up empty and the release ships
      # with no notes -- same behavior as before this step existed.
      #
      # Re-run-after-failure caveat: if the workflow fails after GoReleaser
      # succeeds (which deletes release-drafter's draft) but before the
      # publish step lands, a re-run captures nothing -- the original
      # release-drafter draft is gone. Recover by editing the resulting
      # draft release's body manually (drafts stay mutable until publish)
      # before re-running, or accept an empty published body.
      - name: Capture release-drafter notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases" \
            --jq "[.[] | select(.draft and .tag_name == \"${GITHUB_REF_NAME}\")][0].body // \"\"" \
            > /tmp/release-notes.md
          echo "Captured $(wc -c < /tmp/release-notes.md) bytes of release-drafter notes"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          args: release --clean
        env:
          # GITHUB_TOKEN authorizes the GitHub Release creation.
          # GPG_FINGERPRINT plugs into the .goreleaser.yml signs
          # block so the checksum file is signed with the imported key.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      # Apply the captured release-drafter notes and flip the draft to
      # published in a single call. The org's "Immutable Releases"
      # setting locks the release at publish time, so this must be the
      # last step -- once it runs, no further changes are possible.
      # Pairs with `release.draft: true` in .goreleaser.yml.
      #
      # The `--notes-file` flag is guarded by a non-empty check so an
      # empty capture (no matching draft, or a draft with empty body)
      # doesn't clobber whatever body the draft already has -- defense-
      # in-depth for any race or recovery path that puts content in the
      # draft between the capture and publish steps.
      - name: Apply notes and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s /tmp/release-notes.md ]; then
            gh release edit "${GITHUB_REF_NAME}" \
              --notes-file /tmp/release-notes.md \
              --draft=false
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false
          fi

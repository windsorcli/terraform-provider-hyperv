# Tag-triggered release workflow. Cuts a GitHub Release with cross-
# compiled provider binaries, GPG-signed checksums, and the registry
# manifest. The Terraform Registry picks up the resulting release via
# the windsorcli/hyperv webhook configured at registry publication
# time.
#
# Layout matches PLAN.md S16.3. One secret the maintainer must set
# before tagging:
#
#   GPG_PRIVATE_KEY  -- ASCII-armored release-signing private key.
#
# Fingerprint is emitted as the `fingerprint` output of the import-gpg
# step and passed through to GoReleaser as GPG_FINGERPRINT env -- not
# a secret, derived at runtime.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Required to create the GitHub Release.

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # GoReleaser needs full history to compute changelog deltas
          # and detect the prior tag.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Import GPG release-signing key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          args: release --clean
        env:
          # GITHUB_TOKEN authorizes the GitHub Release creation.
          # GPG_FINGERPRINT plugs into the .goreleaser.yml signs
          # block so the checksum file is signed with the imported key.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      # Flip the draft to published only after every binary, checksum,
      # signature, and manifest is attached. The org's "Immutable
      # Releases" setting locks the release at publish time, so this
      # has to be the last step -- once it runs, no further asset
      # changes are possible. Pairs with `release.draft: true` in
      # .goreleaser.yml.
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false

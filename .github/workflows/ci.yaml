# =============================================================================
# CI workflow
# =============================================================================
# Runs on PRs and push-to-main. Each job invokes `task <name>` so a maintainer
# reproducing a CI failure runs the same command locally. See docs/PLAN.md
# §16 for the design and §17 for the Taskfile that owns the actual commands.
#
# Action versions are pinned to commit SHAs and Renovate-managed (see
# .github/renovate.json). The `# vX.Y.Z` comment after each pin is what
# Renovate reads to bump the SHA on new releases.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task tools
      - run: task lint:go

  yamllint:
    name: Lint (YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
      - run: pip install yamllint
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task lint:yaml

  unit:
    name: Unit Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      # terraform CLI is needed by resource.UnitTest validate-time
      # regression tests (e.g. TestValidate_URLDrivenByVariable). The
      # framework spins up a real terraform process to drive the plan
      # phase; without the CLI on PATH those tests fail at setup.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task test:unit
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: always()
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  unit-windows:
    # Free hosted runner (no Hyper-V, can't run TF_ACC). Catches
    # cross-platform Go bugs (path handling, executable resolution) and
    # actually runs the integration tests that skip on Linux because
    # PS 5.1 + pwsh 7.x come pre-installed. Acceptance tests with real
    # Hyper-V live on self-hosted runners per docs/PLAN.md §16.8.
    name: Unit Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      # terraform CLI is needed by resource.UnitTest validate-time
      # regression tests; same rationale as the Linux job above.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task test:unit

  build-matrix:
    name: Build (cross-arch smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task build:all

  release-snapshot:
    # Full GoReleaser pipeline minus publish/sign. build-matrix above
    # is a fast Go-compile smoke test against a 6-target subset; this
    # job runs the actual release engine across the full 13-binary
    # matrix and validates the archive name templates, SHA256SUMS
    # generation, manifest inclusion, and signs-block syntax. Catches
    # .goreleaser.yml drift at PR time -- with the org's immutable
    # releases setting, a botched tag burns the version number, so
    # config errors must surface here rather than at release time.
    name: Release snapshot (goreleaser)
    runs-on: ubuntu-latest
    # Explicit per-job least-privilege scope. The snapshot only
    # compiles and archives locally -- no GitHub API writes -- so
    # contents: read is sufficient. Pinning this at the job level
    # prevents a future workflow-level permissions widening from
    # silently broadening this job's scope.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # GoReleaser inspects git history during snapshot; --snapshot
          # complains about a missing prior tag without full history.
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # install-only puts goreleaser on PATH so `task release:snapshot`
          # can invoke it -- keeps the "every CI job runs `task <name>`"
          # contract from the workflow header.
          install-only: true
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task release:snapshot

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task fmt:check

  gomod-check:
    # Catches go.sum drift at PR time. The release build no longer runs
    # `go mod tidy` (see .goreleaser.yml header) — without this gate,
    # drift would only surface as a failed release after the tag is cut.
    name: Go Modules Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task gomod:check

  validate-examples:
    name: Validate Terraform Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task validate:examples

  docs-drift:
    name: Docs Drift Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      # tfplugindocs falls back to downloading Terraform itself when none is on
      # PATH, and that download path verifies a HashiCorp GPG signature that
      # has expired. Pre-installing Terraform short-circuits the download.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task tools
      - run: task docs:check

  docs-validate:
    name: Docs Validate (Registry rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      # See note on docs-drift — Terraform on PATH avoids tfplugindocs's
      # GPG-verified Terraform download.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - run: task tools
      - run: task docs:validate

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
      - shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery
          task lint:ps

  pester-linux:
    name: Pester (pwsh 7.x, Linux)
    # Fast lane: cross-platform pwsh runs the same .Tests.ps1 files. Catches
    # Pester-syntax and contract-shape regressions in seconds. Hyper-V
    # cmdlets are mocked so no Windows host needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Invoke-Pester -Path internal/scripts -CI

  pester-windows-51:
    name: Pester (Windows PowerShell 5.1)
    # The PLAN.md S5 syntax floor. Production scripts run on whatever the
    # connected host has; PS 5.1 is the lowest version we support, so the
    # contract tests must pass under it. windows-latest ships with both
    # powershell.exe (5.1) and pwsh (7.x); `shell: powershell` selects 5.1.
    #
    # Three PS 5.1-specific bootstraps are load-bearing here:
    #   1. Install-PackageProvider NuGet  -- PS 5.1's PowerShellGet 1.x
    #      prompts for NuGet on first Set-PSRepository / Install-Module;
    #      non-TTY treats that as 'No' and the command fails.
    #   2. PSGallery trust       -- avoids the "untrusted repo" prompt.
    #   3. Import-Module Pester  -- PS 5.1 ships Pester 3.4 in System32 and
    #      $PSModulePath loads system modules first; without an explicit
    #      Import-Module of 5.x, Invoke-Pester -CI fails (the -CI switch
    #      is Pester 5+ only).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - shell: powershell
        run: |
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force | Out-Null
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path internal/scripts -CI

  sast-scan:
    name: gosec SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3 # v2.28.0
        with:
          args: -quiet ./...
        env:
          GOTOOLCHAIN: 'auto'
          GOFLAGS: '-buildvcs=false'

name: Enforce PR Labels

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check for required labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const requiredLabels = [
              'feature', 'enhancement', 'fix', 'bugfix', 'bug',
              'chore', 'documentation', 'dependencies',
              'major', 'minor', 'patch', 'breaking'
            ];
            const prLabels = context.payload.pull_request.labels.map(label => label.name);
            const hasRequiredLabel = prLabels.some(label => requiredLabels.includes(label));

            if (!hasRequiredLabel) {
              core.setFailed('Your PR must have at least one of the required labels: ' + requiredLabels.join(', '));
            }

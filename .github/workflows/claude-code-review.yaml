            --model claude-sonnet-4-6
            --max-turns 50
            --allowedTools Read,Grep,Glob,Bash(git:*),Bash(gh pr view:*),Bash(gh pr edit:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(jq:*),Bash(cat:*),Bash(tee:*),Bash(mktemp:*),Bash(head:*),Bash(xargs:*),Bash(python3:*),Bash(go vet:*),Write
            --disallowedTools WebSearch,WebFetch

  resolve-threads:
    name: Resolve Threads
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize' &&
      github.event.pull_request.user.type != 'Bot' &&
      !contains(github.event.pull_request.labels.*.name, 'dependencies') &&
      !github.event.pull_request.draft
    steps:
      - name: Check for unresolved bot threads
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          OWNER="${GH_REPO%/*}"
          REPO="${GH_REPO#*/}"
          COUNT=$(gh api graphql -f query='
            query($owner:String!,$repo:String!,$num:Int!){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$num){
                  reviewThreads(first:100){
                    nodes{
                      isResolved
                      comments(first:1){ nodes{ author{ login } } }
                    }
                  }
                }
              }
            }' -F owner="$OWNER" -F repo="$REPO" -F num="$PR_NUMBER" \
            --jq '[.data.repository.pullRequest.reviewThreads.nodes[]
                   | select(.isResolved == false)
                   | select(.comments.nodes[0].author.login
                       | test("\\[bot\\]$|^github-actions|^claude$"))]
                   | length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Unresolved bot threads: $COUNT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.count != '0'
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@24492741e0ccfdef4c1d19da8e11e0f373d07494 # v1.0.124
        if: steps.check.outputs.count != '0'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Your only job is to check whether existing review comments on
            this PR have been addressed and resolve the ones that have.
            Do NOT post new findings or update the PR summary.

            1. List unresolved review threads:

              gh api graphql -f query='
                query($owner:String!,$repo:String!,$num:Int!){
                  repository(owner:$owner,name:$repo){
                    pullRequest(number:$num){
                      reviewThreads(first:100){
                        nodes{
                          id isResolved isOutdated
                          comments(first:1){ nodes{ author{login} path line body } }
                        }
                      }
                    }
                  }
                }' -F owner="${GH_REPO%/*}" -F repo="${GH_REPO#*/}" -F num="$PR_NUMBER"

            2. For each unresolved thread authored by the bot (login ending
               in `[bot]`, `github-actions`, or `claude`):
               - If `isOutdated: true`, resolve it.
               - Otherwise, read the file at the commented path/line and
                 check whether the specific concern is still present.
               - If the issue is fixed, resolve the thread.
               - If a human has replied to the thread, leave it alone.

            3. Resolve via:

              gh api graphql -f query='
                mutation($id:ID!){ resolveReviewThread(input:{threadId:$id}){ thread{ id } } }' \
                -F id="<threadId>"

            That is all. Do not post new comments. Do not modify the PR
            description. Be fast.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools Read,Bash(gh api:*),Bash(cat:*),Bash(jq:*)
            --disallowedTools WebSearch,WebFetch

# golangci-lint v2 configuration.
# See https://golangci-lint.run/usage/configuration/.

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - durationcheck
    - errcheck
    - forcetypeassert
    - godot
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - predeclared
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
  settings:
    depguard:
      rules:
        provider-uses-framework:
          deny:
            - pkg: github.com/hashicorp/terraform-plugin-sdk/v2
              desc: this provider uses terraform-plugin-framework, not SDKv2; see docs/PLAN.md §1
  exclusions:
    rules:
      # tools.go imports tool binaries we don't want depguard to flag.
      - path: tools/tools.go
        linters: [depguard]

formatters:
  enable:
    - gofmt
    - goimports

version: '3'

# Local automation. CI workflows under .github/workflows/ invoke these same
# targets so a maintainer reproducing a CI failure runs the same command.
# See docs/PLAN.md §17 for the design.
#
# Tool versions:
#   • Anything in aqua.yaml is provisioned by `aqua install`.
#   • The `go install <pkg>@vX.Y.Z` lines below are Renovate-managed via the
#     custom regex manager in .github/renovate.json.

dotenv: ['.env', '.env.local']

vars:
  PROVIDER_NAME: hyperv
  GO_BUILD_FLAGS: -trimpath
  COVERAGE_FILE: coverage.out

tasks:

  default:
    desc: Quick feedback loop — lint + unit tests
    deps: [lint, test:unit]

  # ---------- Build ----------

  build:
    desc: Build the provider for the current platform
    cmds:
      - go build {{.GO_BUILD_FLAGS}} -o terraform-provider-{{.PROVIDER_NAME}} .

  build:all:
    desc: Cross-compile smoke build for all supported platforms (Linux/macOS host only)
    cmds:
      - for: { matrix: { OS: [linux, darwin, windows], ARCH: [amd64, arm64] } }
        cmd: GOOS={{.ITEM.OS}} GOARCH={{.ITEM.ARCH}} go build {{.GO_BUILD_FLAGS}} -o /dev/null .

  install:
    desc: Build and install for local Terraform development
    vars:
      DEV_VERSION: 0.0.0-dev
    cmds:
      - mkdir -p ~/.terraform.d/plugins/registry.terraform.io/windsorcli/{{.PROVIDER_NAME}}/{{.DEV_VERSION}}/$(go env GOOS)_$(go env GOARCH)
      - go build {{.GO_BUILD_FLAGS}} -ldflags "-X main.version={{.DEV_VERSION}}" -o ~/.terraform.d/plugins/registry.terraform.io/windsorcli/{{.PROVIDER_NAME}}/{{.DEV_VERSION}}/$(go env GOOS)_$(go env GOARCH)/terraform-provider-{{.PROVIDER_NAME}}_v{{.DEV_VERSION}} .

  # ---------- Lint ----------

  lint:
    desc: Run all linters
    deps: [lint:go, lint:ps, lint:yaml]

  lint:go:
    desc: golangci-lint
    cmds:
      - golangci-lint run

  lint:ps:
    desc: PSScriptAnalyzer on internal/scripts
    summary: |
      Skipped if either (a) internal/scripts/ doesn't exist yet or
      (b) pwsh isn't on PATH. CI's psscriptanalyzer job installs PS Core
      so it always runs there.
    cmds:
      - pwsh -NoProfile -Command "Invoke-ScriptAnalyzer -Path internal/scripts -Recurse -Settings .psscriptanalyzer.psd1 -EnableExit"
    status:
      - test ! -d internal/scripts || ! command -v pwsh > /dev/null 2>&1

  lint:yaml:
    desc: yamllint on workflows and config files
    cmds:
      - yamllint .github/ Taskfile.yaml aqua.yaml

  scan:
    desc: Run gosec SAST scanner
    cmds:
      - gosec -quiet ./...

  # ---------- Format ----------

  fmt:
    desc: Format all source
    deps: [fmt:go, fmt:tf]

  fmt:go:
    cmds:
      - gofmt -s -w .

  fmt:tf:
    cmds:
      - terraform fmt -recursive examples/
    status:
      - test ! -d examples

  fmt:check:
    desc: Verify formatting (CI gate)
    cmds:
      - test -z "$(gofmt -s -l .)"
      - terraform fmt -check -recursive examples/

  # ---------- Test ----------

  test:
    desc: Lint + unit tests
    deps: [lint, test:unit]

  test:unit:
    desc: Go unit tests (no TF_ACC)
    cmds:
      - go test -race -short -coverprofile={{.COVERAGE_FILE}} ./...

  test:acc:
    desc: Acceptance tests against real Hyper-V (TF_ACC=1; reads .env.local)
    env:
      TF_ACC: "1"
    cmds:
      - go test -v -timeout 120m -run '^TestAcc' ./...

  test:pester:
    desc: Pester tests against PowerShell scripts (Windows + Hyper-V required)
    cmds:
      - pwsh -NoProfile -Command "Invoke-Pester -Path internal/scripts -CI"
    status:
      - test ! -d internal/scripts

  sweep:
    desc: Sweep orphan acceptance-test resources
    cmds:
      - go test ./... -sweep=local

  # ---------- Docs ----------

  generate:
    desc: Run go generate and tfplugindocs
    cmds:
      - go generate ./...
      - tfplugindocs generate --provider-name {{.PROVIDER_NAME}}

  docs:check:
    desc: CI gate — generated docs match schema
    summary: |
      Runs `task generate` then asserts no tracked-or-untracked changes in the
      generated paths. Uses `git status --porcelain` instead of `git diff` so
      paths that don't exist yet (no resources shipped) don't error.
    cmds:
      - task: generate
      - |
        drift="$(git status --porcelain docs/index.md docs/resources docs/data-sources docs/functions 2>/dev/null)"
        if [ -n "$drift" ]; then
          echo "Generated docs have drifted. Run 'task generate' and commit the result." >&2
          echo "$drift" >&2
          exit 1
        fi

  docs:validate:
    desc: Validate doc structure against Registry rules
    cmds:
      - tfplugindocs validate --provider-name {{.PROVIDER_NAME}}

  validate:examples:
    desc: terraform validate on each resource/data-source example
    summary: |
      Skips examples/provider/ — that example references the published
      provider address which isn't resolvable until we ship to the registry.
      Syntax checking on examples/provider/ is covered by `task fmt:check`.
    cmds:
      - |
        for dir in examples/resources/*/ examples/data-sources/*/; do
          [ -d "$dir" ] || continue
          echo "validating $dir"
          (cd "$dir" && terraform init -backend=false -no-color > /dev/null && terraform validate -no-color)
        done

  # ---------- Release ----------

  release:snapshot:
    desc: Local GoReleaser dry-run (no publish, no sign)
    cmds:
      - goreleaser release --snapshot --clean --skip=publish,sign

  # ---------- Tools ----------
  # Most tools come from aqua (`aqua install` reads aqua.yaml). The Go-native
  # tools below are Renovate-managed via the custom regex manager in
  # .github/renovate.json — pin to specific versions, not @latest.

  tools:
    desc: Install Go-native dev tools (linters, doc generator)
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
      - go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.21.0

  # ---------- Cleanup ----------

  clean:
    desc: Remove build artifacts and coverage
    cmds:
      - rm -f terraform-provider-{{.PROVIDER_NAME}}
      - rm -f {{.COVERAGE_FILE}}
      - rm -rf dist/

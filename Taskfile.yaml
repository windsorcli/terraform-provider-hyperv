version: '3'

# Local automation. CI workflows under .github/workflows/ invoke these same
# targets so a maintainer reproducing a CI failure runs the same command.
# See docs/PLAN.md §17 for the design.
#
# Tool versions:
#   • Anything in aqua.yaml is provisioned by `aqua install`.
#   • The `go install <pkg>@vX.Y.Z` lines below are Renovate-managed via the
#     custom regex manager in .github/renovate.json.

# Task's dotenv loader treats the FIRST file in the list as highest precedence
# (https://taskfile.dev/reference/schema/#dotenv). Order is .env.local then .env
# so a developer's personal overrides in .env.local win over any committed
# defaults in .env. Both files are gitignored; .env.example is the committed
# template -- copy it to .env.local and fill in HYPERV_* values for `task test:acc`.
dotenv: ['.env.local', '.env']

vars:
  PROVIDER_NAME: hyperv
  GO_BUILD_FLAGS: -trimpath
  COVERAGE_FILE: coverage.out

tasks:

  default:
    desc: Quick feedback loop — lint + unit tests
    deps: [lint, test:unit]

  # ---------- Build ----------

  build:
    desc: Build the provider for the current platform
    cmds:
      - go build {{.GO_BUILD_FLAGS}} -o terraform-provider-{{.PROVIDER_NAME}} .

  build:all:
    desc: Cross-compile smoke build for all supported platforms (Linux/macOS host only)
    cmds:
      - for: { matrix: { OS: [linux, darwin, windows], ARCH: [amd64, arm64] } }
        cmd: GOOS={{.ITEM.OS}} GOARCH={{.ITEM.ARCH}} go build {{.GO_BUILD_FLAGS}} -o /dev/null .

  install:
    desc: Build and install for local Terraform development
    vars:
      DEV_VERSION: 0.0.0-dev
    cmds:
      - mkdir -p ~/.terraform.d/plugins/registry.terraform.io/windsorcli/{{.PROVIDER_NAME}}/{{.DEV_VERSION}}/$(go env GOOS)_$(go env GOARCH)
      - go build {{.GO_BUILD_FLAGS}} -ldflags "-X main.version={{.DEV_VERSION}}" -o ~/.terraform.d/plugins/registry.terraform.io/windsorcli/{{.PROVIDER_NAME}}/{{.DEV_VERSION}}/$(go env GOOS)_$(go env GOARCH)/terraform-provider-{{.PROVIDER_NAME}}_v{{.DEV_VERSION}} .

  # ---------- Lint ----------

  lint:
    desc: Run all linters
    deps: [lint:go, lint:ps, lint:yaml]

  lint:go:
    desc: golangci-lint
    cmds:
      - golangci-lint run

  lint:ps:
    desc: PSScriptAnalyzer on production scripts in internal/scripts
    summary: |
      Skipped if either (a) internal/scripts/ doesn't exist yet or
      (b) pwsh isn't on PATH. CI's psscriptanalyzer job installs PS Core
      so it always runs there.

      Excludes Pester test infrastructure (*.Tests.ps1 and _*.ps1) since
      stub functions for cmdlet mocking and test helpers don't satisfy
      production-code rules (e.g. PSReviewUnusedParameter on stubs).
    cmds:
      # Single-quoted -Command arg keeps the shell from expanding $_, which it
      # would otherwise replace with the previous command's last argument.
      - >-
        pwsh -NoProfile -Command 'Get-ChildItem -Path internal/scripts -Recurse -Filter *.ps1 |
        Where-Object { $_.Name -notlike "*.Tests.ps1" -and $_.Name -notlike "_*.ps1" } |
        ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Settings .psscriptanalyzer.psd1 -EnableExit }'
    status:
      - test ! -d internal/scripts || ! command -v pwsh > /dev/null 2>&1

  lint:yaml:
    desc: yamllint on workflows and config files
    cmds:
      - yamllint .github/ Taskfile.yaml aqua.yaml

  scan:
    desc: Run gosec SAST scanner
    cmds:
      - gosec -quiet ./...

  # ---------- Format ----------

  fmt:
    desc: Format all source
    deps: [fmt:go, fmt:tf]

  fmt:go:
    cmds:
      - gofmt -s -w .

  fmt:tf:
    cmds:
      - terraform fmt -recursive examples/
    status:
      - test ! -d examples

  fmt:check:
    desc: Verify formatting (CI gate)
    cmds:
      - test -z "$(gofmt -s -l .)"
      - terraform fmt -check -recursive examples/

  # ---------- Test ----------

  test:
    desc: Lint + unit tests (quick feedback; no bench, no PowerShell)
    deps: [lint, test:unit]

  test:all:
    desc: Full test bar — lint + unit + Pester + acceptance (pre-release gate)
    summary: |
      Runs every test tier sequentially, fail-fast: lint → unit → Pester →
      acceptance. Each step must pass before the next runs, so a broken lint
      doesn't burn time on the bench.

      Requirements:
        - PowerShell (pwsh) on PATH for Pester.
        - .env.local populated with HYPERV_* values + the HYPERV_TEST_*
          fixture vars listed in .env.example, all reachable on the
          maintainer's workbench. See docs/contributing/acceptance-tests.md.

      Use this before tagging a release. For day-to-day iteration prefer
      `task test` (lint + unit only) -- it doesn't need a bench.
    cmds:
      - task: lint
      - task: test:unit
      - task: test:pester
      - task: test:acc

  test:unit:
    desc: Go unit tests (no TF_ACC)
    cmds:
      # ./internal/... excludes the root main package, which has no tests
      # and would trip `go: no such tool "covdata"` on toolchains that
      # ship without covdata (the aqua-provisioned Go 1.26.2 build hits
      # this). main.go is exercised by `task build` instead.
      - go test -race -short -coverprofile={{.COVERAGE_FILE}} ./internal/...

  test:acc:
    desc: Acceptance tests against real Hyper-V (TF_ACC=1; reads .env.local)
    env:
      TF_ACC: "1"
    cmds:
      - go test -v -timeout 120m -run '^TestAcc' ./...

  test:pester:
    desc: Pester tests against PowerShell scripts (cross-platform; cmdlets are mocked)
    summary: |
      Locks the JSON wire contract for embedded scripts. The tests stub
      Hyper-V cmdlets via Pester's Mock so they run anywhere pwsh is
      available — Windows hosted runners, ubuntu-latest, local macOS dev.
      Real Hyper-V validation lives in `task test:acc` (M1d).
    cmds:
      - pwsh -NoProfile -Command "Invoke-Pester -Path internal/scripts -CI"
    status:
      - test ! -d internal/scripts

  sweep:
    desc: Sweep orphan acceptance-test resources
    cmds:
      - go test ./... -sweep=local

  # ---------- Docs ----------

  generate:
    desc: Run go generate and tfplugindocs
    cmds:
      - go generate ./...
      - tfplugindocs generate --provider-name {{.PROVIDER_NAME}}

  docs:check:
    desc: CI gate — generated docs match schema
    summary: |
      Runs `task generate` then asserts no tracked-or-untracked changes in the
      generated paths. Uses `git status --porcelain` instead of `git diff` so
      paths that don't exist yet (no resources shipped) don't error.
    cmds:
      - task: generate
      - |
        drift="$(git status --porcelain docs/index.md docs/resources docs/data-sources docs/functions 2>/dev/null)"
        if [ -n "$drift" ]; then
          echo "Generated docs have drifted. Run 'task generate' and commit the result." >&2
          echo "$drift" >&2
          exit 1
        fi

  docs:validate:
    desc: Validate doc structure against Registry rules
    cmds:
      - tfplugindocs validate --provider-name {{.PROVIDER_NAME}}

  validate:examples:
    desc: terraform validate on each resource/data-source example
    summary: |
      Skips examples/provider/ — that example references the published
      provider address which isn't resolvable until we ship to the registry.
      Syntax checking on examples/provider/ is covered by `task fmt:check`.

      Builds the provider into a temp dir and uses dev_overrides so
      `terraform validate` can resolve windsorcli/hyperv against the local
      binary (the provider isn't on the public registry yet).
    cmds:
      - |
        set -e
        BIN_DIR=$(mktemp -d)
        CLI_CFG=$(mktemp)
        trap "rm -rf $BIN_DIR $CLI_CFG" EXIT

        go build {{.GO_BUILD_FLAGS}} -o "$BIN_DIR/terraform-provider-{{.PROVIDER_NAME}}" .
        cat > "$CLI_CFG" <<EOF
        provider_installation {
          dev_overrides {
            "windsorcli/{{.PROVIDER_NAME}}" = "$BIN_DIR"
          }
          direct {}
        }
        EOF
        export TF_CLI_CONFIG_FILE="$CLI_CFG"

        # dev_overrides skips init, so go straight to validate. Capture
        # output once, scrub the harmless dev-override warning, and propagate
        # the real exit code so failures both print useful diagnostics and
        # fail the task. `set +e` inside the subshell is load-bearing: with
        # the outer `set -e` inherited, `output=$(...)` would abort the
        # subshell on a non-zero validate before printf could run, hiding
        # the diagnostic.
        for dir in examples/resources/*/ examples/data-sources/*/; do
          [ -d "$dir" ] || continue
          echo "validating $dir"
          (
            set +e
            cd "$dir" || exit 1
            output=$(terraform validate -no-color 2>&1)
            rc=$?
            printf '%s\n' "$output" | grep -v 'dev_overrides' | grep -v '^Warning:' | grep -v '^$'
            exit $rc
          )
        done

  # ---------- Release ----------

  release:snapshot:
    desc: Local GoReleaser dry-run (no publish, no sign)
    cmds:
      - goreleaser release --snapshot --clean --skip=publish,sign

  # ---------- Tools ----------
  # Most tools come from aqua (`aqua install` reads aqua.yaml). The Go-native
  # tools below are Renovate-managed via the custom regex manager in
  # .github/renovate.json — pin to specific versions, not @latest.

  tools:
    desc: Install Go-native dev tools (linters, doc generator)
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.21.0

  # ---------- Cleanup ----------

  clean:
    desc: Remove build artifacts and coverage
    cmds:
      - rm -f terraform-provider-{{.PROVIDER_NAME}}
      - rm -f {{.COVERAGE_FILE}}
      - rm -rf dist/

# GoReleaser v2 config for the windsorcli/hyperv Terraform provider.
#
# Cross-compiles the provider binary for every Terraform-Registry-supported
# (OS, arch) tuple, archives each as a per-target zip, generates a
# SHA256SUMS file, and GPG-signs the checksums file. The Registry pulls
# from the resulting GitHub Release on tag push -- see PLAN.md S16.3 for
# the workflow layout.
#
# Adapted from HashiCorp's terraform-provider-scaffolding-framework.
# Run `goreleaser check` after edits; `goreleaser release --snapshot
# --clean --skip=publish --skip=sign` for a local dry run.

version: 2

# No `before.hooks` block: tidying go.sum at release time would
# produce artifacts whose dependency graph doesn't match the tagged
# commit. The `gomod:check` task (wired into CI) gates go.sum
# cleanliness at PR time instead, so a broken go.sum is caught and
# fixed on main rather than auto-rewritten in the release sandbox.

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }}'
    # Registry-supported targets per
    # https://developer.hashicorp.com/terraform/registry/providers/os-arch
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: ['zip']
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    # Registry expects the manifest file alongside the binaries; the
    # checksum file MUST include it so the Registry can verify integrity.
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # GPG_FINGERPRINT is exported by the import-gpg action in the
      # release workflow. signing the checksums file (not each binary)
      # is the Registry-mandated pattern -- the checksums file itself
      # already covers the binaries.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  # `keep-existing` preserves the release notes that release-drafter
  # already authored on the draft. Without this, goreleaser would
  # overwrite the body with its own (empty, since changelog is
  # disabled) one when it attaches artifacts -- the release would
  # lose the curated notes AND the changelog-on-release workflow
  # would prepend an empty section to CHANGELOG.md.
  #
  # `draft: true` keeps the release in draft state through the asset
  # upload phase. Required because the org has GitHub's "Immutable
  # Releases" enabled: once a release is published, no further asset
  # uploads are allowed. The release.yaml workflow flips draft to
  # published in a final `gh release edit --draft=false` step, so
  # immutability locks in only after every binary, checksum, and
  # signature is in place. `replace_existing_draft` makes the goreleaser
  # invocation rerun-safe (a re-tag overwrites the prior draft cleanly).
  mode: keep-existing
  draft: true
  replace_existing_draft: true
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  # CHANGELOG.md is human-curated (release-drafter populates it from
  # labeled PRs); GoReleaser shouldn't auto-overwrite the release
  # body. Use the GitHub Release notes (drafted by release-drafter)
  # as the source of truth.
  disable: true
